name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.6'

      - name: Unzip project
        run: unzip DailyPlanner.zip

      - name: Fix repository config
        run: |
          cd DailyPlanner
          # Remove the problematic repositories block from app/build.gradle.kts
          sed -i '/^repositories {/,/^}/d' app/build.gradle.kts
          # Add jitpack to settings.gradle.kts instead
          sed -i 's|mavenCentral()|mavenCentral()\n        maven { url = uri("https://jitpack.io") }|' settings.gradle.kts
          cat settings.gradle.kts

      - name: Generate Gradle wrapper
        run: |
          cd DailyPlanner
          gradle wrapper --gradle-version 8.6

      - name: Build APK
        run: |
          cd DailyPlanner
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: DailyPlanner-APK
          path: DailyPlanner/app/build/outputs/apk/debug/app-debug.apk
